<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link class="hljs-theme" rel="stylesheet" href="style/style.css">
    <title>FGT Docs by OpenANR</title>
</head>
<body>
    <!-- Top Header -->
    <header class="header">
        <div class="header-left">
            <button id="mobile-toggle" aria-label="Toggle Sidebar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <a href="#" class="logo">
                <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <div class="brand-text">
                    <span class="logo-text">FGT Docs</span>
                    <span class="brand-subtitle">by : Open ANR</span>
                </div>
            </a>
        </div>

        <!-- Search Input -->
        <div class="search-container">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="docs-search" placeholder="Cari dokumentasi..." autocomplete="off">
        </div>

        <div class="header-right">
            <!-- Theme toggle switch in header -->
            <div class="theme-switch-container">
                <label class="theme-switch-label" for="theme-toggle-checkbox">
                    <input type="checkbox" id="theme-toggle-checkbox" class="theme-switch-input">
                    <span class="theme-switch-slider">
                        <span class="theme-switch-slider-icon icon-sun">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="5"></circle>
                                <line x1="12" y1="1" x2="12" y2="3"></line>
                                <line x1="12" y1="21" x2="12" y2="23"></line>
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                <line x1="1" y1="12" x2="3" y2="12"></line>
                                <line x1="21" y1="12" x2="23" y2="12"></line>
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                            </svg>
                        </span>
                        <span class="theme-switch-slider-icon icon-moon">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                            </svg>
                        </span>
                    </span>
                </label>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar Navigation -->
        <aside id="sidebar">

            <!-- List of Tutorials -->
            <ul id="tutorial-list">
                <li>Loading ...</li>
            </ul>

            <!-- About Section at Bottom -->
            <div class="sidebar-footer">
                <a href="about.html" id="about-link" class="footer-link">
                    <svg class="info-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="16" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12.01" y2="8"></line>
                    </svg>
                    <span>About</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main id="content-display">
            <h1>SELAMAT DATANG DI LIBRARY TUTORIAL</h1>
            <p>Di website ini saya pribadi menyediakan berbagai macam-macam tutorial yang membahas mulai dari sistem operasi, pemrograman, troubleshooting, dan lain-lain.</p>
        </main>
    </div>

    <!-- Overlay for mobile drawer -->
    <div id="sidebar-overlay" class="overlay"></div>

    <script src="js/script.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
